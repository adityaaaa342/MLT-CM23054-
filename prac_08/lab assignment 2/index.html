<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Assignment 2: Evaluate Accuracy & Confusion Matrix</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>
</head>
<body>
    <div class="container">
        <h1>Lab Assignment 2: Validation & Evaluation</h1>
        <p>Train the dataset, collect validation data, and generate a confusion matrix.</p>
        
        <div class="main-content">
            <div class="video-section">
                <video id="webcam" autoplay playsinline width="400" height="400"></video>
                <div id="status">Loading models...</div>
            </div>
            
            <div class="controls-section">
                <div class="panel train-panel">
                    <h2>1. Train Data</h2>
                    <button class="train-btn" data-class="0">Train "Apple" <span class="count0">(0)</span></button>
                    <button class="train-btn" data-class="1">Train "Banana" <span class="count1">(0)</span></button>
                    <button class="train-btn" data-class="2">Train "Orange" <span class="count2">(0)</span></button>
                </div>

                <div class="panel val-panel">
                    <h2>2. Validation Data</h2>
                    <button class="val-btn" data-class="0">Add Val "Apple" <span class="val-count0">(0)</span></button>
                    <button class="val-btn" data-class="1">Add Val "Banana" <span class="val-count1">(0)</span></button>
                    <button class="val-btn" data-class="2">Add Val "Orange" <span class="val-count2">(0)</span></button>
                </div>
                
                <div class="panel eval-panel">
                    <h2>3. Evaluate</h2>
                    <button id="evalBtn">Run Evaluation</button>
                </div>
            </div>
        </div>
        
        <div id="results" class="results-section" style="display: none;">
            <h2>Evaluation Results</h2>
            <p id="accuracyResult" class="accuracy">Accuracy: --%</p>
            
            <h3>Confusion Matrix</h3>
            <table id="confusionMatrix">
                <thead>
                    <tr>
                        <th>True \ Pred</th>
                        <th>Apple</th>
                        <th>Banana</th>
                        <th>Orange</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows generated by JS -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
