<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Classification Performance Analysis (Lab 3)</title>
    <!-- Favicon -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- TensorFlow.js and MobileNet -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Card -->
        <div class="card">
            <header>
                <h1>Performance Analysis</h1>
                <p>Lab Assignment 3: FPS & Inference Metrics</p>
            </header>

            <main>
                <!-- Performance Metrics Panel -->
                <div class="metrics-panel">
                    <div class="metric-box">
                        <span class="metric-label">FPS</span>
                        <span id="fps-value" class="metric-value">--</span>
                    </div>
                    <div class="metric-box">
                        <span class="metric-label">Inference Time</span>
                        <span id="inference-value" class="metric-value">-- ms</span>
                    </div>
                </div>

                <!-- Webcam Video Area -->
                <div class="video-container">
                    <video id="webcam" autoplay playsinline muted></video>
                    
                    <!-- Prediction Overlay -->
                    <div id="video-overlay" class="video-overlay hidden">
                        <span id="overlay-label">Detecting...</span>
                    </div>

                    <div id="loading-overlay" class="overlay">
                        <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="2" x2="12" y2="6"></line>
                            <line x1="12" y1="18" x2="12" y2="22"></line>
                            <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
                            <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
                            <line x1="2" y1="12" x2="6" y2="12"></line>
                            <line x1="18" y1="12" x2="22" y2="12"></line>
                            <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
                            <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
                        </svg>
                        <span>Loading Model...</span>
                    </div>
                </div>

                <!-- Action Button -->
                <button id="toggle-btn" class="primary-btn" disabled>
                    <span class="btn-text">Start Camera & Classify</span>
                </button>

                <!-- Results Section -->
                <div id="results-container" class="results-container hidden">
                    <h2>Detailed Predictions</h2>
                    <ul id="predictions-list" class="predictions-list">
                        <!-- Predictions injected via JS -->
                    </ul>
                </div>
            </main>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
